<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食品关联分析可视化看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
:root{--bg:#f7fafc;--card:#fff;--text:#2d3748;--muted:#718096;--border:#e2e8f0;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);}
header{background:linear-gradient(90deg,#2b6cb0,#2c5282);color:#fff;padding:24px 32px;box-shadow:0 2px 6px rgba(0,0,0,.1);}
header h1{margin:0;font-size:26px;}
header p{margin:6px 0 0;opacity:.9;font-size:14px;}
nav{display:flex;gap:8px;padding:16px 32px 0;}
nav button{padding:10px 20px;border:none;background:#edf2f7;color:#4a5568;border-radius:6px 6px 0 0;cursor:pointer;font-weight:600;}
nav button.active{background:var(--card);color:#2b6cb0;border-bottom:2px solid var(--card);}
main{padding:24px 32px 48px;}
.tab{display:none;}
.tab.active{display:block;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px;}
.kpi{background:var(--card);padding:18px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.kpi .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.kpi .value{font-size:28px;font-weight:700;margin:6px 0;color:#2b6cb0;}
.kpi .sub{font-size:12px;color:var(--muted);}
.card{background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px;margin-bottom:24px;}
.card h2{margin:0 0 16px;font-size:18px;border-left:4px solid #2b6cb0;padding-left:10px;}
.chart-container{position:relative;height:320px;}
.chart-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:24px;}
#network{width:100%;height:650px;border:1px solid var(--border);border-radius:8px;background:#fff;}
.tooltip{position:absolute;background:rgba(0,0,0,.8);color:#fff;padding:6px 10px;border-radius:4px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:1000;}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
th,td{text-align:left;padding:10px;border-bottom:1px solid var(--border);vertical-align:top;}
th{background:#f7fafc;color:var(--muted);font-weight:600;}
.align-table td.num{text-align:right;font-variant-numeric:tabular-nums;}
/* scene top table: 场景 / 排名 / 原始类目 / 拓圈类目 / Pair 数 / Lift */
.scene-table th:nth-child(1),.scene-table td:nth-child(1){width:10%;}
.scene-table th:nth-child(2),.scene-table td:nth-child(2){width:8%;text-align:center;}
.scene-table th:nth-child(3),.scene-table td:nth-child(3){width:26%;}
.scene-table th:nth-child(4),.scene-table td:nth-child(4){width:26%;}
.scene-table th:nth-child(5),.scene-table td:nth-child(5){width:15%;}
.scene-table th:nth-child(6),.scene-table td:nth-child(6){width:15%;}
/* group pair table: 人群 / 排名 / 类别 / 原始类目 / 拓圈类目 / 所属场景 */
.group-table th:nth-child(1),.group-table td:nth-child(1){width:12%;}
.group-table th:nth-child(2),.group-table td:nth-child(2){width:8%;text-align:center;}
.group-table th:nth-child(3),.group-table td:nth-child(3){width:10%;}
.group-table th:nth-child(4),.group-table td:nth-child(4){width:25%;}
.group-table th:nth-child(5),.group-table td:nth-child(5){width:25%;}
.group-table th:nth-child(6),.group-table td:nth-child(6){width:12%;}
tbody tr:hover{background:#f7fafc;}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;color:#fff;background:#a0aec0;}
.small{font-size:12px;color:var(--muted);}
.scene-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.scene-legend span{display:flex;align-items:center;gap:6px;font-size:12px;}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.filter-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.filter-row label{font-size:13px;color:var(--muted);font-weight:600;}
.filter-row select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:13px;color:var(--text);min-width:140px;}
</style>
</head>

// Chart helpers
function barChart(ctx, labels, datasets){
  return new Chart(ctx, {type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:true}}}});
}

new Chart(document.getElementById('sceneBar'),{

});

new Chart(document.getElementById('scenePairs'),{
  type:'bar',

const sceneFilter = document.getElementById('sceneFilter');
Object.keys(DATA.topByScene).forEach(scene=>{
  sceneFilter.innerHTML += `<option value="${scene}">${scene}</option>`;

// Scene top 5 rules aligned table
function renderSceneTable(selected='all'){
  let sceneTopHtml = '<table class="align-table scene-table"><thead><tr><th>场景</th><th>排名</th><th>原始类目</th><th>拓圈类目</th><th>Pair 数</th><th>Lift</th></tr></thead><tbody>';
  Object.entries(DATA.topByScene).forEach(([scene,rules])=>{
    if(selected!=='all' && selected!==scene) return;
    rules.forEach((r,idx)=>{
      sceneTopHtml += `<tr><td><span class="badge" style="background:${colors[scene]}">${scene}</span></td><td>${idx+1}</td><td>${r.from}</td><td>${r.to}</td><td class="num">${r.pairs.toLocaleString()}</td><td class="num">${r.lift}</td></tr>`;
    });
  });
  sceneTopHtml += '</tbody></table>';
  document.getElementById('sceneTopRules').innerHTML = sceneTopHtml;
}
renderSceneTable();
sceneFilter.addEventListener('change', e=>renderSceneTable(e.target.value));

// D3 network
(function(){
  const data = DATA.network;
  const width = document.getElementById('network').clientWidth;
  const height = 650;
  const svg = d3.select('#network').append('svg').attr('width', width).attr('height', height).attr('viewBox',[0,0,width,height]);
  const g = svg.append('g');
  svg.call(d3.zoom().on('zoom', e=>g.attr('transform', e.transform)));

  const nodes = data.nodes.map(d=>Object.create(d));
  const links = data.links.map(d=>Object.create(d));

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d=>Math.max(40,120-d.lift/20)))
    .force('charge', d3.forceManyBody().strength(-180))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collide', d3.forceCollide().radius(12));

  const link = g.append('g').attr('stroke','#999').attr('stroke-opacity',.5)
    .selectAll('line').data(links).join('line')
    .attr('stroke-width', d=>Math.max(1,Math.sqrt(d.lift)/6));

  const node = g.append('g').selectAll('g').data(nodes).join('g')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active) simulation.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x; d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null;}));

  node.append('circle').attr('r', d=>4+Math.sqrt(d.degree)).attr('fill', d=>colors[d.scene]).attr('stroke','#fff').attr('stroke-width',1.5);
  node.append('text').text(d=>d.id).attr('x',8).attr('y',3).attr('font-size',10).attr('fill','#4a5568');

  const tooltip = d3.select('#tooltip');
  node.on('mouseover',(e,d)=>{
    tooltip.style('opacity',1).html(`<b>${d.id}</b><br>场景：${d.scene}<br>连接数：${d.degree}`).style('left',(e.pageX+10)+'px').style('top',(e.pageY+10)+'px');
  }).on('mouseout',()=>tooltip.style('opacity',0));
  link.on('mouseover',(e,d)=>{
    tooltip.style('opacity',1).html(`${d.source.id} → ${d.target.id}<br>Lift：${d.lift}<br>Pair 数：${d.pairs.toLocaleString()}<br>场景：${d.scene}`).style('left',(e.pageX+10)+'px').style('top',(e.pageY+10)+'px');
  }).on('mouseout',()=>tooltip.style('opacity',0));

  simulation.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
  });
})();

// Group pair filters
const catFilter = document.getElementById('catFilter');
const pairSceneFilter = document.getElementById('pairSceneFilter');
Object.keys(colors).forEach(scene=>{
  pairSceneFilter.innerHTML += `<option value="${scene}">${scene}</option>`;

// Group pair top combinations aligned table
const groupLabels = DATA.groups;
function renderGroupTable(cat='all', scene='all'){
  let gpHtml = '<table class="align-table group-table"><thead><tr><th>人群</th><th>排名</th><th>类别</th><th>原始类目</th><th>拓圈类目</th><th>所属场景</th></tr></thead><tbody>';
  groupLabels.forEach(g=>{
    ['即时','延迟'].forEach(type=>{
      if(cat!=='all' && cat!==type) return;
      const badgeColor = type==='即时' ? '#48bb78' : '#ed8936';
      DATA.groupPairTop[g][type].slice(0,5).forEach((r,idx)=>{
        const s = r.所属场景;
        if(scene!=='all' && scene!==s) return;
        gpHtml += `<tr><td>${g}</td><td>${idx+1}</td><td><span class="badge" style="background:${badgeColor}">${type}</span></td><td>${r.原始类目}</td><td>${r.拓圈类目}</td><td><span class="badge" style="background:${colors[s] || '#a0aec0'}">${s}</span></td></tr>`;
      });
    });
  });
  gpHtml += '</tbody></table>';
  document.getElementById('groupPairTables').innerHTML = gpHtml;
}
renderGroupTable();
catFilter.addEventListener('change', ()=>renderGroupTable(catFilter.value, pairSceneFilter.value));
pairSceneFilter.addEventListener('change', ()=>renderGroupTable(catFilter.value, pairSceneFilter.value));
</script>
